name: Create GitHub release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify version and extract release notes
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag version ($tag_version) does not match package.json ($package_version)." >&2
            exit 1
          fi

          awk -v heading="### $tag_version" '
            $0 == heading { found = 1; next }
            found && /^### / { exit }
            found { print }
            END { if (!found) exit 1 }
          ' README.md > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "Release notes for version $tag_version are empty." >&2
            exit 1
          fi

          echo "VERSION=$tag_version" >> "$GITHUB_ENV"
          echo "VSIX_PATH=fastcompare-${tag_version}.vsix" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Package extension
        run: npm run package:vsix -- --out "$VSIX_PATH"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" "$VSIX_PATH"
          --verify-tag
          --title "Fast Compare $VERSION"
          --notes-file release-notes.md
