name: Attach VSIX to release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Verify release version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Release tag version ($tag_version) does not match package.json ($package_version)." >&2
            exit 1
          fi

          echo "VSIX_PATH=fastcompare-${tag_version}.vsix" >> "$GITHUB_ENV"

      - name: Package extension
        run: npm run package:vsix -- --out "$VSIX_PATH"

      - name: Attach VSIX to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "$VSIX_PATH" --clobber
